version: "3.7"

services:

  app_proxy:
    environment:
      # Server uses host network mode to access LAN miners
      # Connect via host.docker.internal which maps to host
      APP_HOST: host.docker.internal
      APP_PORT: 3000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    
  server:
    image: jaydevstack/miner-radar:v0.1.0@sha256:856de064513ac977d12d5763a1d0cf9783f799a301ed33249519bc91de8754b5
    init: true
    restart: on-failure
    stop_grace_period: 1m
    network_mode: host
    volumes:
      - ${APP_DATA_DIR}/data:/data
