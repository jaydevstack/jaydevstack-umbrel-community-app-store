version: "3.7"

services:

  app_proxy:
    environment:
      # The format here is: <app-id>_<docker-service-name>_1
      APP_HOST: jaydevstack-store-miner-radar_web_1
      APP_PORT: 3000
    
  server:
    image: jaydevstack/miner-radar:v0.0.1@sha256:2b943a35096b959ebed22c027bc5f296537aced266ab73216a91624d401745e0
    init: true
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data:/data
