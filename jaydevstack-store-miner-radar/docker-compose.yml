version: "3.7"

services:

  app_proxy:
    environment:
      # Server uses host network mode to access LAN miners
      # Connect via host.docker.internal which maps to host
      APP_HOST: host.docker.internal
      APP_PORT: 3000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    
  server:
    image: jaydevstack/miner-radar:v0.1.2@sha256:fe7f94d70a294ca907c0a02dc3e506a54d805a1e721b30e058443269b41a6b25
    init: true
    restart: on-failure
    stop_grace_period: 1m
    network_mode: host
    volumes:
      - ${APP_DATA_DIR}/data:/data
